<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Online | OJAS BIOFUEL. LLP</title>
    
    <link rel="icon" type="image/png" href="../assets/images/Tab2.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/layout.css">
    <link rel="stylesheet" href="../styles/components/navbar.css">
    <link rel="stylesheet" href="../styles/components/footer.css">
    <link rel="stylesheet" href="../styles/order.css">

    <style>
        /* Smooth transitions for theme switching */
        .order-section { transition: background-color 0.3s ease; }
        .order-card { transition: background-color 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease; }
        .order-header h2, .order-header p, .order-form label { transition: color 0.3s ease; }
        .order-form input, .order-form select, .order-form textarea, .phone-prefix { transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease; }

        /* =========================================
           DARK THEME EXPLICIT OVERRIDES
           ========================================= */
        body.dark-theme .order-section {
            background: #121A1D; /* Deep ecosystem background */
        }

        body.dark-theme .order-card {
            background: #1A2428; /* Elevated dark card surface */
            box-shadow: 0 15px 45px rgba(0,0,0,0.25);
            border-top-color: #388E3C;
        }

        body.dark-theme .order-header h2 {
            color: #81C784;
        }

        body.dark-theme .order-header p,
        body.dark-theme .order-form label {
            color: #CFD8DC; /* Muted secondary text */
        }

        /* Form Inputs - Added higher specificity and !important to force override of order.css */
        body.dark-theme .order-form input,
        body.dark-theme .order-form select,
        body.dark-theme .order-form textarea,
        body.dark-theme .order-form .input-group input,
        body.dark-theme .order-form .input-group select,
        body.dark-theme .order-form .phone-group input,
        body.dark-theme #qty-input {
            background: #1E2B30 !important;
            color: #ECEFF1 !important;
            border: 1px solid #2D3E45 !important;
        }

        body.dark-theme .order-form input::placeholder,
        body.dark-theme .order-form textarea::placeholder {
            color: #78909C !important;
        }

        body.dark-theme .order-form input:focus,
        body.dark-theme .order-form select:focus,
        body.dark-theme .order-form textarea:focus {
            border-color: #81C784 !important;
            outline: none;
            box-shadow: 0 0 0 3px rgba(129, 199, 132, 0.15) !important;
        }

        /* Phone Prefix Override */
        body.dark-theme .phone-prefix {
            background: #121A1D !important;
            color: #81C784 !important;
            border: 1px solid #2D3E45 !important;
            border-right: none !important;
        }

        /* Fix internal borders for the input-group select drop-down */
        body.dark-theme .input-group select {
            border-left: 1px solid #2D3E45 !important;
        }

        /* Dynamic Form Status Overrides (Intercepts inline JS colors for dark mode) */
        body.dark-theme #formStatus[style*="#E8F5E9"], 
        body.dark-theme #formStatus[style*="rgb(232, 245, 233)"] {
            background-color: rgba(46, 125, 50, 0.15) !important;
            color: #81C784 !important;
            border-color: rgba(129, 199, 132, 0.3) !important;
        }

        body.dark-theme #formStatus[style*="#FFEBEE"],
        body.dark-theme #formStatus[style*="rgb(255, 235, 238)"] {
            background-color: rgba(211, 47, 47, 0.15) !important;
            color: #EF5350 !important;
            border-color: rgba(239, 83, 80, 0.3) !important;
        }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <main class="order-section">
        <div class="container">
            <div class="order-card">
                <div class="order-header">
                    <h2>Bulk Order Inquiry</h2>
                    <p>Submit your industrial fuel requirements for a custom quote and dedicated supply chain consultation.</p>
                </div>
                
                <form id="orderForm" class="order-form" action="https://formspree.io/f/mqewovzb" method="POST">
                    
                    <div class="full-width">
                        <label><i class="fa-regular fa-building"></i> Company/Industry Name</label>
                        <input type="text" name="Company Name" placeholder="Enter full corporate or facility name" required>
                    </div>
                    
                    <div>
                        <label><i class="fa-solid fa-leaf"></i> Product Selection</label>
                        <select name="Product" required>
                            <option value="" disabled selected>Choose a sustainable product...</option>
                            <option value="Biomass Briquettes">Biomass Briquettes</option>
                            <option value="Biomass Pellets">Biomass Pellets</option>
                            <option value="Industrial Fuel">Industrial Fuel Mix</option>
                        </select>
                    </div>
                    
                    <div>
                        <label><i class="fa-solid fa-weight-scale"></i> Required Quantity</label>
                        <div class="input-group" id="qty-container">
                            <input type="number" name="Quantity" id="qty-input" placeholder="Min 10 (e.g. 50)" min="10" max="99999" required>
                            <select name="Unit" required>
                                <option value="MT">MT (Metric Tons)</option>
                                <option value="Tons">Tons</option>
                                <option value="KG">KG</option>
                            </select>
                        </div>
                        <div id="qty-warning" style="display: none; color: #D32F2F; font-size: 0.85rem; font-weight: 700; margin-top: 8px;">
                            <i class="fa-solid fa-circle-exclamation"></i> Maximum Quantity 99999.
                        </div>
                    </div>
                    
                    <!-- Separated Name and Designation -->
                    <div>
                        <label><i class="fa-regular fa-user"></i> Full Name</label>
                        <input type="text" name="Full Name" placeholder="First & Last Name" required>
                    </div>

                    <div>
                        <label><i class="fa-regular fa-id-badge"></i> Designation</label>
                        <input type="text" name="Designation" placeholder="e.g. Procurement Manager" required>
                    </div>
                    
                    <!-- Added Email Address to balance the grid! -->
                    <div>
                        <label><i class="fa-regular fa-envelope"></i> Email Address</label>
                        <input type="email" name="Email" placeholder="Official business email" required>
                    </div>

                    <div>
                        <label><i class="fa-solid fa-phone"></i> Mobile Number</label>
                        <div class="phone-group">
                            <span class="phone-prefix">+91</span>
                            <input type="tel" name="Phone Number" pattern="[0-9]{10}" maxlength="10" placeholder="10-digit number" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                        </div>
                    </div>
                    
                    <div class="full-width">
                        <label><i class="fa-solid fa-location-dot"></i> Delivery Location</label>
                        <textarea name="Delivery Address" rows="3" placeholder="Provide the exact factory, warehouse, or plant address for logistics planning..." required></textarea>
                    </div>
                    
                    <button type="submit" class="order-btn full-width">Request Custom Quote <i class="fa-solid fa-arrow-right"></i></button>
                </form>

                <div id="formStatus" style="display: none; text-align: center; margin-top: 25px; font-weight: 600; padding: 18px; border-radius: 12px; font-size: 1.05rem;"></div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <button id="theme-toggle-btn" class="theme-toggle-btn" aria-label="Toggle Theme">
        <i class="fa-solid fa-moon"></i>
    </button>

    <script src="../scripts/main.js" type="module"></script>
    <script src="../scripts/nav.js"></script>
    <script src="../scripts/footer.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var form = document.getElementById("orderForm");
            var status = document.getElementById("formStatus");
            var submitBtn = form.querySelector('button[type="submit"]');

            // --- QUANTITY VALIDATION LOGIC ---
            var qtyInput = document.getElementById("qty-input");
            var qtyContainer = document.getElementById("qty-container");
            var qtyWarning = document.getElementById("qty-warning");

            qtyInput.addEventListener("input", function() {
                if (this.value.startsWith('0')) {
                    this.value = this.value.replace(/^0+/, '');
                }

                if (this.value.length > 5) {
                    this.value = this.value.slice(0, 5); 
                    qtyWarning.style.display = "block";
                    qtyContainer.style.borderColor = "#EF5350"; /* Adjusted dark theme red */
                    qtyContainer.style.boxShadow = "0 0 0 4px rgba(239, 83, 80, 0.15)"; 
                } else {
                    qtyWarning.style.display = "none";
                    qtyContainer.style.borderColor = ""; 
                    qtyContainer.style.boxShadow = ""; 
                }
            });
            // ---------------------------------

            form.addEventListener("submit", async function(event) {
                event.preventDefault(); 
                
                submitBtn.innerHTML = 'Processing Request... <i class="fa-solid fa-circle-notch fa-spin"></i>';
                submitBtn.disabled = true;
                status.style.display = "none";

                var data = new FormData(form);

                fetch(form.action, {
                    method: form.method,
                    body: data,
                    headers: { 'Accept': 'application/json' }
                }).then(response => {
                    if (response.ok) {
                        status.innerHTML = "<i class='fa-solid fa-circle-check'></i> Thanks for your order inquiry. Our commercial team will connect with you shortly.";
                        status.style.backgroundColor = "#E8F5E9";
                        status.style.color = "#2E7D32";
                        status.style.border = "1px solid #C8E6C9";
                        status.style.display = "block";
                        form.reset();
                    } else {
                        response.json().then(data => {
                            if (Object.hasOwn(data, 'errors')) {
                                status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
                            } else {
                                status.innerHTML = "<i class='fa-solid fa-triangle-exclamation'></i> Oops! There was a problem submitting your inquiry.";
                            }
                            status.style.backgroundColor = "#FFEBEE";
                            status.style.color = "#D32F2F";
                            status.style.border = "1px solid #FFCDD2";
                            status.style.display = "block";
                        })
                    }
                }).catch(error => {
                    status.innerHTML = "<i class='fa-solid fa-wifi'></i> Oops! There was a network problem submitting your inquiry.";
                    status.style.backgroundColor = "#FFEBEE";
                    status.style.color = "#D32F2F";
                    status.style.border = "1px solid #FFCDD2";
                    status.style.display = "block";
                }).finally(() => {
                    submitBtn.innerHTML = 'Request Custom Quote <i class="fa-solid fa-arrow-right"></i>';
                    submitBtn.disabled = false;
                });
            });
        });
    </script>
</body>
</html>
