<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | OJAS BIOFUEL. LLP</title>
    
    <link rel="icon" type="image/webp" href="/public/Tab2.webp">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="/styles/base.css">
    <link rel="stylesheet" href="/styles/layout.css">
    
    <style>
        .error-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            background-color: #fdfdfd;
            padding: 20px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: #2E7D32;
            margin: 0;
            line-height: 1;
        }
        .error-message {
            font-size: 1.5rem;
            color: #37474F;
            margin-bottom: 20px;
            margin-top: 10px;
        }
        .error-description {
            color: #546E7A;
            max-width: 500px;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: #2E7D32;
            color: #ffffff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .home-btn:hover {
            background: #1B5E20;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(46, 125, 50, 0.2);
        }
    </style>
</head>
<body>
    <main class="error-section">
        <h1 class="error-code">404</h1>
        <h2 class="error-message">Oops! Page Not Found</h2>
        <p class="error-description">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let's get you back on track.</p>

    </main>
</body>
</html>
