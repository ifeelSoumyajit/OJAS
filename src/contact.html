<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | OJAS BIOFUEL. LLP</title>
    
    <link rel="icon" type="image/png" href="../assets/images/Tab2.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/layout.css">
    <link rel="stylesheet" href="../styles/components/navbar.css">
    <link rel="stylesheet" href="../styles/components/footer.css">
    <link rel="stylesheet" href="../styles/contact.css">
</head>
<body>

    <div id="nav-placeholder"></div>

    <main class="contact-wrapper">
        <div class="container">
            <div class="contact-stack">
                <section class="form-card">
                    <h2>Send us a Query</h2>
                    
                    <form id="contactForm" class="contact-form" action="https://formspree.io/f/xpqkeevn" method="POST">
                        <input type="text" name="Name" placeholder="Your Name" required>
                        <input type="email" name="Email" placeholder="Your Email" required>
                        <input type="text" name="Subject" placeholder="Subject" class="full-width">
                        <textarea name="Message" rows="4" placeholder="How can we help you?" class="full-width" required></textarea>
                        <button type="submit" class="submit-btn full-width">Send Message</button>
                    </form>
                    
                    <div id="formStatus" style="display: none; text-align: center; margin-top: 20px; font-weight: 600; padding: 15px; border-radius: 8px; font-size: 1.05rem;"></div>

                </section>

                <section class="email-direct-section">
                    <p>Or directly connect to</p>
                    <a href="mailto:vinodzalake25@gmail.com" class="big-email">vinodzalake25@gmail.com</a>
                </section>

                <section class="info-card">
                    <div class="info-content">
                        <h2>Direct Contact</h2>
                        <p><strong><i class="fa-solid fa-user"></i> Vinod Zalake</strong><br>Founder & Director</p>
                        <p><i class="fa-solid fa-phone"></i> +91 70307 21875 / 74</p>
                        <p><i class="fa-solid fa-envelope"></i> vinodzalake25@gmail.com</p>
                        <p><i class="fa-solid fa-location-dot"></i> FL NO 03, CHINTAMANI NR MAHADEV MANDIR,<br> 
                           KHADAKWASLA, PUNE 411024</p>
                    </div>
                    <div class="map-frame">
                        <iframe 
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3784.843603417734!2d73.77458631489163!3d18.445413187453472!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTjCsDI2JzQzLjUiTiA3M8KwNDYnMzYuNSJF!5e0!3m2!1sen!2sin!4v1649660000000!5m2!1sen!2sin" 
                            width="100%" 
                            height="100%" 
                            style="border:0;" 
                            allowfullscreen="" 
                            loading="lazy">
                        </iframe>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../scripts/main.js" type="module"></script>
    <script src="../scripts/nav.js"></script>
    <script src="../scripts/footer.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var form = document.getElementById("contactForm");
            var status = document.getElementById("formStatus");
            var submitBtn = form.querySelector('button[type="submit"]');

            form.addEventListener("submit", async function(event) {
                event.preventDefault(); // Stops the redirect
                
                // Show loading state
                submitBtn.textContent = 'Sending...';
                submitBtn.disabled = true;
                status.style.display = "none";

                var data = new FormData(form);

                fetch(form.action, {
                    method: form.method,
                    body: data,
                    headers: {
                        'Accept': 'application/json'
                    }
                }).then(response => {
                    if (response.ok) {
                        // Success formatting
                        status.innerHTML = "Thanks for getting in touch. Our team will connect you shortly.";
                        status.style.backgroundColor = "#E8F5E9";
                        status.style.color = "#2E7D32";
                        status.style.border = "1px solid #C8E6C9";
                        status.style.display = "block";
                        form.reset();
                    } else {
                        // Formspree error handling
                        response.json().then(data => {
                            if (Object.hasOwn(data, 'errors')) {
                                status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
                            } else {
                                status.innerHTML = "Oops! There was a problem submitting your form.";
                            }
                            status.style.backgroundColor = "#FFEBEE";
                            status.style.color = "#D32F2F";
                            status.style.border = "1px solid #FFCDD2";
                            status.style.display = "block";
                        })
                    }
                }).catch(error => {
                    // Network error handling
                    status.innerHTML = "Oops! There was a network problem submitting your form.";
                    status.style.backgroundColor = "#FFEBEE";
                    status.style.color = "#D32F2F";
                    status.style.border = "1px solid #FFCDD2";
                    status.style.display = "block";
                }).finally(() => {
                    // Reset button back to normal
                    submitBtn.textContent = 'Send Message';
                    submitBtn.disabled = false;
                });
            });
        });
    </script>
</body>
</html>
