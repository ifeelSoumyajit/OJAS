<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Online | OJAS BIOFUEL. LLP</title>
    
    <link rel="icon" type="image/png" href="../assets/images/Tab2.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/layout.css">
    <link rel="stylesheet" href="../styles/components/navbar.css">
    <link rel="stylesheet" href="../styles/components/footer.css">
    <link rel="stylesheet" href="../styles/order.css">
</head>
<body>

    <div id="nav-placeholder"></div>

    <main class="order-section">
        <div class="container">
            <div class="order-card">
                <h2>Bulk Order Inquiry</h2>
                <p>Submit your industrial fuel requirements for a custom quote.</p>
                
                <form id="orderForm" class="order-form" action="https://formspree.io/f/mqewovzb" method="POST">
                    <div class="full-width">
                        <label>Company/Industry Name</label>
                        <input type="text" name="Company Name" placeholder="Enter Company Name" required>
                    </div>
                    <div>
                        <label>Product Selection</label>
                        <select name="Product" required>
                            <option value="">Choose Product...</option>
                            <option value="Biomass Briquettes">Biomass Briquettes</option>
                            <option value="Biomass Pellets">Biomass Pellets</option>
                            <option value="Industrial Fuel">Industrial Fuel</option>
                        </select>
                    </div>
                    <div>
                        <label>Required Quantity</label>
                        <div class="input-group">
                            <input type="number" name="Quantity" placeholder="Example: 25" required>
                            <select name="Unit" required>
                                <option value="MT">MT</option>
                                <option value="Tons">Tons</option>
                                <option value="KG">KG</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label>Contact Person</label>
                        <input type="text" name="Contact Person" placeholder="Full Name" required>
                    </div>
                    <div>
                        <label>Phone Number</label>
                        <div class="phone-group">
                            <span class="phone-prefix">+91</span>
                            <input type="tel" name="Phone Number" pattern="[0-9]{10}" maxlength="10" placeholder="10-digit mobile number" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                        </div>
                    </div>
                    <div class="full-width">
                        <label>Delivery Location</label>
                        <textarea name="Delivery Address" rows="3" placeholder="Factory/Warehouse Address" required></textarea>
                    </div>
                    <button type="submit" class="order-btn full-width">Submit Inquiry</button>
                </form>

                <div id="formStatus" style="display: none; text-align: center; margin-top: 20px; font-weight: 600; padding: 15px; border-radius: 8px; font-size: 1.05rem;"></div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../scripts/main.js" type="module"></script>
    <script src="../scripts/nav.js"></script>
    <script src="../scripts/footer.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var form = document.getElementById("orderForm");
            var status = document.getElementById("formStatus");
            var submitBtn = form.querySelector('button[type="submit"]');

            form.addEventListener("submit", async function(event) {
                event.preventDefault(); // Stops the redirect
                
                // Show loading state
                submitBtn.textContent = 'Sending Inquiry...';
                submitBtn.disabled = true;
                status.style.display = "none";

                var data = new FormData(form);

                fetch(form.action, {
                    method: form.method,
                    body: data,
                    headers: {
                        'Accept': 'application/json'
                    }
                }).then(response => {
                    if (response.ok) {
                        // Success formatting
                        status.innerHTML = "Thanks for your order inquiry. Our team will connect with you shortly.";
                        status.style.backgroundColor = "#E8F5E9";
                        status.style.color = "#2E7D32";
                        status.style.border = "1px solid #C8E6C9";
                        status.style.display = "block";
                        form.reset();
                    } else {
                        // Formspree error handling
                        response.json().then(data => {
                            if (Object.hasOwn(data, 'errors')) {
                                status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
                            } else {
                                status.innerHTML = "Oops! There was a problem submitting your inquiry.";
                            }
                            status.style.backgroundColor = "#FFEBEE";
                            status.style.color = "#D32F2F";
                            status.style.border = "1px solid #FFCDD2";
                            status.style.display = "block";
                        })
                    }
                }).catch(error => {
                    // Network error handling
                    status.innerHTML = "Oops! There was a network problem submitting your inquiry.";
                    status.style.backgroundColor = "#FFEBEE";
                    status.style.color = "#D32F2F";
                    status.style.border = "1px solid #FFCDD2";
                    status.style.display = "block";
                }).finally(() => {
                    // Reset button back to normal
                    submitBtn.textContent = 'Submit Inquiry';
                    submitBtn.disabled = false;
                });
            });
        });
    </script>
</body>
</html>
