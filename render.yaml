services:
  - type: web
    name: ojasbiofuel
    env: static
    buildCommand: null
    staticPublishPath: .

    routes:
      # =========================================================
      # HOMEPAGE /HOME ROUTING
      # =========================================================
      # 1. If someone types /index or /index.html, force them to /Home
      - type: redirect
        source: /index(?:\.html)?
        destination: /Home

      # 2. Tell the server to secretly render index.html behind /Home
      - type: rewrite
        source: /Home
        destination: /index.html

      # =========================================================
      # Main Hub Pages & Subpages (Keep your existing routes here)
      # =========================================================
      - type: rewrite
        source: /about
        destination: /in/about.html

      - type: rewrite
        source: /services
        destination: /in/services.html

      - type: rewrite
        source: /products
        destination: /in/products.html

      - type: rewrite
        source: /projects
        destination: /in/projects.html
        
      # ... Keep the rest of your routes intact below ...
