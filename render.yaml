services:
  - type: web
    name: ojasbiofuel
    env: static
    buildCommand: null
    staticPublishPath: .

    routes:
      # Main Hub Pages
      - type: rewrite
        source: /about
        destination: /in/about.html

      - type: rewrite
        source: /services
        destination: /in/services.html

      - type: rewrite
        source: /products
        destination: /in/products.html

      - type: rewrite
        source: /projects
        destination: /in/projects.html

      # About Sub-pages
      - type: rewrite
        source: /vision
        destination: /in/vision.html

      - type: rewrite
        source: /team
        destination: /in/team.html

      - type: rewrite
        source: /foundation
        destination: /in/foundation.html

      # Services Sub-pages
      - type: rewrite
        source: /supply
        destination: /in/supply.html

      - type: rewrite
        source: /trading
        destination: /in/trading.html

      - type: rewrite
        source: /distribution
        destination: /in/distribution.html
        
      # Products Page
      - type: rewrite
        source: /products
        destination: /in/products.html

      # Products Sub-pages
      - type: rewrite
        source: /fuel
        destination: /in/fuel.html

      - type: rewrite
        source: /briquettes
        destination: /in/briquettes.html

      - type: rewrite
        source: /pellets
        destination: /in/pellets.html

      # Projects Sub-pages
      - type: rewrite
        source: /current-projects
        destination: /in/current-projects.html

      - type: rewrite
        source: /completed-projects
        destination: /in/completed-projects.html

      - type: rewrite
        source: /initiatives
        destination: /in/initiatives.html

      # Action & Legal Pages
      - type: rewrite
        source: /contact
        destination: /in/contact.html

      - type: rewrite
        source: /order
        destination: /in/order.html

      - type: rewrite
        source: /terms
        destination: /in/terms.html

      - type: rewrite
        source: /policy
        destination: /in/policy.html
